인사말
안녕하세요. 펜션 리버힐입니다.
저희 리버힐은 남이섬에서 2Km 떨어진 북한강변에 위치한 펜션이며 늊ㄹ랜드산 원목을 사용하여 지은 웰빙형 펜션입니다.
펜션 내부에서 창문을 열면 북한강변이 한 눈에 보이는
수려한 풍경이 아름다운 곳으로 여유로움과 낭만이 가늑한 곳입니다.
남이섬을 바라보며 할 수 있는 드라이브와 강변 산책로가 있어 여유로운 한 때를 즐기며 아름다운 추억을 만들 수 있습니다.
아름다운 펜션 리버힐로 여러분을 초대합니다
from 펜션 리버힐


bbq
즐거운 여행에서 빼놓을 수 없는 것이 맛있는 음식이겠죠?
맑은 공기와 풀내음, 솔향기가 가득한 야외 넓은 마당에서 바베큐를 하실 수 있도록 그릴과 숯, 도구등을 준비하여 드립니다. 
쏟아질듯한 별을 보며 사랑하는 연인, 친구,가족, 동료들과의 오붓한 바베큐도 드시고 쌓인 스트레스도 한방에 풀어보세요.
숯 + 그릴 + 도구
2인 : 1만원 (그릴 사용 후 남은 음식물과 쓰레기는 직접 정리하셔야 합니다.)

수상레저
펜션 리버힐 인근에 전문강사진이 있는 수상레저시설들이 많습니다.
이 레저시설들은 깨끗한 시설과 최신장비등을 구비하고 있으며 수상레저에 관련된 장비들도 판매 및 수리도 가능하다고 합니다.수상스키, 웨이크보드, 젯트스키, 플라이피쉬, 바나나, 땅콩 등 스릴과 재미가 넘치는 수상레저를 즐겨 보세요

북한강
펜션 리버힐 바로 앞에 북한강이 흐르고 있습니다.
넓은 북한강을 바라보며 소중한 추억을 만들어 보세요.

픽업서비스
기차나 버스로 오시는 고객님!
가평역/버스터미널에 도착하셔서 전화주세요!
10분만 커피 한잔 마시며 기다리시면 펜션 픽업차량이 반갑게 마중 나갑니다.
시장 보실 분들은 버스정류장 앞 플러스마트에서 미리 장을 보시고 전화주세요 (031-582-2721, 011-9160-2721)

■ 기본사항 

1. 예약은 연중 가능하며, 언제든 문의해 주세요. 
2. 전화로 사전 확인 후 아래 계좌로 예약금을 입금해 주시면 예약이 완료됩니다. 
3. 예약 후 12시간 안에 입금이 확인되지 않을 경우 별도 통보 없이 예약취소처리 될 수 있습니다. 
4. 문의사항은 전화 또는 묻고 답하기 게시판을 통해 문의해 주시면 확인 즉시 답변드리겠습니다. 
5. 여름성수기 : 7 월 30 일~ 8 월 2 일
6. 겨울성수기 : 0 월 0 일~ 0 월 0 일, 성수기기간에는 주중에도 성수기요금이 적용됩니다.
7. 바베큐그릴/숯 이용시 만원의 추가요금이 적용됩니다.(2인기준,2인 초과시 별도요금)
8. 픽업 이용고객님은 전화로 문의하시기 바랍니다.

* 예약문의 : 031-581-9733 , 010-7195-2030 

■ 입실안내 

- 입실시간은 이용당일 14:00 이후 입니다.
- 22:00 이후 펜션에 도착하실 경우 미리 연락하셔야 하며, 사전 연락이 없을 경우 입실을 제한받을 수 있습니다.
- 객실 정리 시간이 12:00 부터 14:00 까지 이므로 14:00 이전 입실은 어렵습니다
- 전날 사용하지 않은 객실의 오전입실은 전화로 상담받습니다.
- 입실시 예약하신 인원에서 인원이 추가되었을 경우 미리 말씀하셔야 하며, 최대수용인원에서 초과시는 입실이 불가합니다.

■ 퇴실안내

- 퇴실시간은 마지막 이용일 오전 12:00 까지 입니다. 
- 다음 이용인을 위하여 퇴실시간은 준수해 주시기 바랍니다. 
- 퇴실하시기 전 잊으신 물건이 없나 잘 살펴주시고 되도록 시설물 및 소모품은 원위치에 정돈해 주세요
- 쓰레기는 지정된 장소에 분리하여 주시기 바랍니다.
- 퇴실시 열쇠를 꼭 반납하시고 파손된 물건이나 불편했던 점을 말씀해주시면 참고하겠습니다.

■ 환불안내

·  올바른 예약문화의 정착을 위하여 불가피한 조치이오니 양해 부탁드립니다.
·  환불 적용은 이용요금 100% 입금시에만 적용합니다.
·  예약완료 후 취소시에는 위약금(객실 및 서비스요금의 10%)이 있습니다.
·  객실과 날짜는 예약 전 신중히 생각하시고 결정해 주시기 바랍니다.
·  예약일 변경시 발생한 수수료도 취소수수료와 동일합니다.
·  이용날짜 변경은 일주일 전에 가능합니다.
·  변경후 취소는 환불이 안됩니다.

예약취소 수수료 안내 (기본 취소 수수료 : 10%)

이용 예약일 3~당일 취소 : 환불이 불가능합니다.
이용 예약일 4~7일전 취소 : 입금액의 50% 환불
그외 취소 : 입금액의 90% 환불

■ 유의사항

· 화재에 특별히 조심해주세요.
· 화재의 위험이 있어서 객실 내 촛불사용을 금지하고 있습니다.
· 객실 및 기타 시설물은 다음 손님을 위하여 되도록 깨끗이 사용해 주세요.
· 애완견 입실은 금지합니다. 
- 애완견 입실 시 강제퇴실 및 숙박요금은 환불되지 않습니다. 
· 객실 내에서는 금연입니다.
- 이용객의 부주의로 인한 사고에 대해서는 책임을지지 않습니다.
· 펜션이 숲속에 있으므로 두꺼운 옷을 꼭 준비해 주세요
· 지나친 고성방가나 폭죽은 다른팀의 조용하고 편안한 휴식을 위하여 자제해 주세요.
· 음식물 및 기타 쓰레기는 깨끗한 환경을 위하여 분리수거 해주세요.
· 기타시설물 이용시 관리실 안내를 받으면 더욱 편리하게 사용하실 수 있습니다.
	
■ 자동차이용시 

1. 서울 → 도농삼거리 → 평내 → 금곡 → 마석 → 대성리 → 청평 → 가평 
2. 서울 → 도농삼거리 → 덕소 → 양수리 → 대성리 → 청평 → 가평 
3. 가평 사거리에서 남이섬 방향으로 직진해서 약 4Km 정도 오시면 뫼촌 이정표가 보입니다. 
좌회전해서 약 2Km정도 오시면 우측으로 저희 강언덕이 보입니다.
