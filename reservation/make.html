<!DOCTYPE html>
<html lang="kor" ng-app="KaisaApp" ng-controller="KaisaController">
<head>
<meta charset="utf-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta http-equiv="cache-control" content="no-cache">
<meta http-equiv="expires" content="0">
<meta http-equiv="pragma" content="no-cache">
<meta name="robots" content="index,follow">
<title>리버힐펜션</title>
<meta name="keywords" content="리버힐펜션,가평펜션">
<meta name="description" content="리버힐펜션,가평펜션">
<meta property="og:type" content="website">
<meta property="og:title" content="리버힐펜션">
<meta property="og:description" content="리버힐펜션,가평펜션">
<meta property="og:image" content="http://riverhillps.com/img/common/logo.png">
<meta property="og:url" content="mobydic.co.kr">
<meta name="fragment" content="!">
<meta name="viewport" content="user-scalable=yes">
<link rel="shortcut icon" href="/img/favicon.ico?ver=0.1" type="image/x-icon">
<link rel="stylesheet" href="/css/common.css" type="text/css">
<link rel="stylesheet" href="/css/reservation.css" type="text/css">
<!--[if lt IE 10]>
<link rel="stylesheet" href="/css/old_browser.css" type="text/css" />
<![endif]-->
<!--[if IE 8]>
<script src="/js/lib/es/es5-shim.min.js"></script>
<![endif]-->
<script src="/js/lib/jquery/jquery-1.11.1.min.js"></script>
<script src="/js/lib/angular/angular.min.js"></script>
<script src="/js/min/kaisa.js"></script>
<script src="/js/controller/reservation/make.js"></script>
</head>
<body data-ng-controller="BodyController">
<div data-kaisa-header="true"></div>
<div data-kaisa-menu="true"></div>
<div id="content">
	
	<h2>객실 생성</h2>
	<form id="roomBase" name="roomBase" ng-submit="setRoom()">
		<ul class="btnSelect">
			<li data-ng-repeat="(idx,i) in roomArray" ng-class="{on : ROOM_BASE_IDX == idx}" data-ng-click="roomArraySelect(idx)">{{i.ROOM_NAME}}</li>
		</ul>
		<table>
			<tr>
				<th>객실번호</th>
				<td><input type="text" name="ROOM_NAME" ng-model="ROOM_BASE.ROOM_NUMBER" required="required" /></td>
			</tr>
			<tr>
				<th>객실명</th>
				<td><input type="text" name="ROOM_NAME" ng-model="ROOM_BASE.ROOM_NAME" required="required" /></td>
			</tr>
			<tr>
				<th>유형</th>
				<td><input type="text" data-only-number="true" name="ROOM_TYPE_CODE" ng-model="ROOM_BASE.ROOM_TYPE_CODE" required="required" style="width:100px;" /> 1: 원룸(침실) 2: 방1+거실+화1 3: 원룸(온돌)</td>
			</tr>
			<tr>
				<th>평수</th>
				<td><input type="text" maxlength="3" data-only-number="true" name="ROOM_M2" ng-model="ROOM_BASE.ROOM_M2" required="required" style="width:50px;" /> 평</td>
			</tr>
			<tr>
				<th>객실 기준 인원</th>
				<td><input type="text" maxlength="3" data-only-number="true" name="MIN_PERSONNEL" ng-model="ROOM_BASE.MIN_PERSONNEL" style="width:50px;" required="required" /> 명</td>
			</tr>
			<tr>
				<th>객실 최대 인원</th>
				<td><input type="text" maxlength="3" data-only-number="true" name="MAX_PERSONNEL" ng-model="ROOM_BASE.MAX_PERSONNEL" style="width:50px;" required="required" /> 명</td>
			</tr>
			<tr>
				<th>비수기 주중 요금</th>
				<td><input type="text" maxlength="3" data-only-number="true" name="PRICE_1" ng-model="ROOM_BASE.PRICE_1" style="width:50px;" required="required" /> 만원</td>
			</tr>
			<tr>
				<th>비수기 금요일 요금</th>
				<td><input type="text" maxlength="3" data-only-number="true" name="PRICE_2" ng-model="ROOM_BASE.PRICE_2" style="width:50px;" required="required" /> 만원</td>
			</tr>
			<tr>
				<th>비수기 주말 요금</th>
				<td><input type="text" maxlength="3" data-only-number="true" name="PRICE_3" ng-model="ROOM_BASE.PRICE_3" style="width:50px;" required="required" /> 만원</td>
			</tr>
			<tr>
				<th>준성수기 주중 요금</th>
				<td><input type="text" maxlength="3" data-only-number="true" name="PRICE_4" ng-model="ROOM_BASE.PRICE_4" style="width:50px;" required="required" /> 만원</td>
			</tr>
			<tr>
				<th>준성수기 금요일 요금</th>
				<td><input type="text" maxlength="3" data-only-number="true" name="PRICE_5" ng-model="ROOM_BASE.PRICE_5" style="width:50px;" required="required" /> 만원</td>
			</tr>
			<tr>
				<th>준성수기 주말 요금</th>
				<td><input type="text" maxlength="3" data-only-number="true" name="PRICE_6" ng-model="ROOM_BASE.PRICE_6" style="width:50px;" required="required" /> 만원</td>
			</tr>
			<tr>
				<th>성수기 주중 요금</th>
				<td><input type="text" maxlength="3" data-only-number="true" name="PRICE_7" ng-model="ROOM_BASE.PRICE_7" style="width:50px;" required="required" /> 만원</td>
			</tr>
			<tr>
				<th>성수기 금요일 요금</th>
				<td><input type="text" maxlength="3" data-only-number="true" name="PRICE_8" ng-model="ROOM_BASE.PRICE_8" style="width:50px;" required="required" /> 만원</td>
			</tr>
			<tr>
				<th>성수기 주말 요금</th>
				<td><input type="text" maxlength="3" data-only-number="true" name="PRICE_9" ng-model="ROOM_BASE.PRICE_9" style="width:50px;" required="required" /> 만원</td>
			</tr>
			<tr>
				<th>기준 인원 초과시 1인당 추가 요금</th>
				<td><input type="text" maxlength="3" data-only-number="true" name="PRICE_ADD" ng-model="ROOM_BASE.PRICE_ADD" style="width:50px;" required="required" /> 만원</td>
			</tr>
			<tr>
				<th>노출우선순위</th>
				<td><input type="text" maxlength="2" data-only-number="true" name="PRIORITY" ng-model="ROOM_BASE.PRIORITY" style="width:50px;" /></td>
			</tr>
			<tr>
				<th>설명</th>
				<td><input type="text" maxlength="100" name="DESCRIPTION" ng-model="ROOM_BASE.DESCRIPTION" /></td>
			</tr>
		</table>
		<ul class="btnSelect">
			<li data-ng-repeat="(idx,i) in roomArray" ng-class="{on : ROOM_BASE_IDX == idx}"  data-ng-click="roomArraySelect(idx)">{{i.ROOM_NAME}}</li>
		</ul>
		<div class="btnWrap">
			<button type="submit" tabindex="8" ng-disabled="!(ROOM_BASE.ROOM_NAME
						&& ROOM_BASE.ROOM_NUMBER
						&& ROOM_BASE.ROOM_TYPE_CODE
						&& ROOM_BASE.ROOM_M2
						&& ROOM_BASE.MIN_PERSONNEL
						&& ROOM_BASE.MAX_PERSONNEL
						&& ROOM_BASE.PRICE_ADD
						&& ROOM_BASE.PRICE_1
						&& ROOM_BASE.PRICE_2
						&& ROOM_BASE.PRICE_3
						&& ROOM_BASE.PRICE_4
						&& ROOM_BASE.PRICE_5
						&& ROOM_BASE.PRICE_6
						&& ROOM_BASE.PRICE_7
						&& ROOM_BASE.PRICE_8
						&& ROOM_BASE.PRICE_9)">생성하기</button>
		</div>
	</form>
</div>
<div data-kaisa-footer="true"></div>
</body>
</html>
